name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build MacOS artifacts
    runs-on: macos-latest

    strategy:
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build static library (.a)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/libcheatscan.a dist/libcheatscan-${{ matrix.target }}.a

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: cheatscan-${{ matrix.target }}
          path: dist/libcheatscan-${{ matrix.target }}.a

  build-linux:
    name: Build Linux artifacts
    runs-on: ubuntu-latest

    strategy:
      matrix:
        target:
          - wasm32-unknown-unknown
          - x86_64-unknown-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build static library (.a)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        run: |
          mkdir -p dist
          if [[ "${{ matrix.target }}" == "wasm32-unknown-unknown" ]]; then
            cp target/${{ matrix.target }}/release/cheatscan.wasm dist/cheatscan.wasm
          else
            cp target/${{ matrix.target }}/release/libcheatscan.a dist/libcheatscan-${{ matrix.target }}.a
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: cheatscan-${{ matrix.target }}
          path: dist/

  release:
    needs:
    - build-macos
    - build-linux
    name: Release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          shasum -a 256 dist/* > dist/sha256.txt
          cat dist/sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*